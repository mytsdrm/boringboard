services:
  app:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      args:
        DISABLE_BROWSER_CONSOLE_LOGS: "true"
    container_name: boringboard
    depends_on:
      - focalboard-db
    ports:
      - "${EXTERNAL_PORT:-8000}:8000"
    volumes:
      - "./config.json:/opt/focalboard/config.json"
      - fbdata:/opt/focalboard/data
    restart: always
    networks:
      - captain-overlay-network

  focalboard-db:
    image: postgres:17@sha256:0027bef26712baaee437a4ea48fdf3d2d2e2bc5f0d81615374408ca320f3c7e3
    container_name: boringboard-postgres
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: boards
      POSTGRES_USER: boardsuser
      POSTGRES_PASSWORD: boardsuser-password
    networks:
      - captain-overlay-network
volumes:
  fbdata:
  pgdata:
networks:
  captain-overlay-network:
    external: true
